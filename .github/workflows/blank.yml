name: Inject Secilc to GSI

on:
workflow_dispatch:
inputs:
rom_url:
description: 'OriginOS .zip dosyasının Direkt İndirme Linki'
required: true
default: 'https://netix.dl.sourceforge.net/project/mystic-gsi-updates/OriginOS/Originos-PD2266-15-compiler250711173629-AB-20260208-MysticGSI.zip?viasf=1&fid=77d8b49dcbabbc5d&e=1783985584&st=8r115uYo_QeP73M9LGN8OA'
aosp_url:
description: 'Ponces AOSP GSI .img.xz Linki'
required: true
default: 'https://github.com/ponces/treble_aosp/releases/download/v2025.05.13/aosp-arm64-ab-gapps-15.0-20250513.img.xz'

jobs:
patch_rom:
runs-on: ubuntu-latest
steps:
- name: 10 GB İmaj İçin GitHub Sunucusunda Yer Aç
run: |
sudo rm -rf /usr/share/dotnet
sudo rm -rf /usr/local/lib/android
sudo rm -rf /opt/ghc
sudo rm -rf "/usr/local/share/boost"
sudo rm -rf "$AGENT_TOOLSDIRECTORY"

  - name: Dosyaları İndir ve Çıkart
    run: |
      echo "OriginOS arşivi (ZIP) indiriliyor..."
      wget -q -O originos.zip "${{ github.event.inputs.rom_url }}"
      
      echo "OriginOS ZIP'ten çıkartılıyor..."
      unzip -q originos.zip
      rm originos.zip
      mv *.img os.img
      
      echo "AOSP GSI (xz) indiriliyor..."
      wget -q -O aosp.img.xz "${{ github.event.inputs.aosp_url }}"
      
  - name: AOSP'den Secilc Çıkart (Donor Ameliyatı)
    run: |
      echo "AOSP xz arşivinden çıkartılıyor..."
      unxz aosp.img.xz
      
      mkdir mnt_aosp
      echo "AOSP imajı mount ediliyor..."
      sudo mount -o ro,loop aosp.img mnt_aosp/
      
      echo "secilc dosyası aranıyor ve kopyalanıyor..."
      if [ -f mnt_aosp/system/bin/secilc ]; then
        cp mnt_aosp/system/bin/secilc ./secilc
      elif [ -f mnt_aosp/system/system/bin/secilc ]; then
        cp mnt_aosp/system/system/bin/secilc ./secilc
      else
        echo "HATA: secilc dosyası AOSP imajında bulunamadı!"
        exit 1
      fi
      
      echo "AOSP imajı kapatılıyor ve siliniyor (Yer açmak için)..."
      sudo umount mnt_aosp/
      rm -rf aosp.img mnt_aosp
      
  - name: Açık Kalp Ameliyatı (OriginOS'a Inject İşlemi)
    run: |
      mkdir mnt
      echo "OriginOS Linux sistemine bağlanıyor (Mount)..."
      sudo mount -o rw,loop os.img mnt/
      
      echo "secilc dosyası OriginOS içine enjekte ediliyor..."
      sudo cp secilc mnt/system/bin/secilc || sudo cp secilc mnt/system/system/bin/secilc
      
      echo "Linux Yetkileri (Permissions) ayarlanıyor..."
      sudo chmod 755 mnt/system/bin/secilc || sudo chmod 755 mnt/system/system/bin/secilc
      sudo chown root:root mnt/system/bin/secilc || sudo chown root:root mnt/system/system/bin/secilc
      
      echo "OriginOS imajı güvenle kapatılıyor..."
      sudo umount mnt/
      
  - name: Dosyayı Sıkıştır (İndirmesi Kolay Olsun Diye)
    run: |
      echo "Yamalanmış imaj ZIP'leniyor..."
      tar -czvf Patched_OriginOS.tar.gz os.img
      
  - name: Sonucu GitHub'a Yükle (Artifact)
    uses: actions/upload-artifact@v4
    with:
      name: Yamali-OriginOS
      path: Patched_OriginOS.tar.gz
