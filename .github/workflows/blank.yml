name: OriginOS 15 Frankenstein Patcher (A04s)

on:
  workflow_dispatch:
    inputs:
      originos_url:
        description: "OriginOS 15 GSI ZIP Linki (MysticGSI)"
        required: true
        default: ""
      aosp_url:
        description: "AOSP 15 GSI XZ Linki (Ponces)"
        required: true
        default: "https://github.com/ponces/treble_aosp/releases/download/v2025.05.13/aosp-arm64-ab-gapps-15.0-20250513.img.xz"

jobs:
  patch-gsi:
    runs-on: ubuntu-22.04
    steps:
      - name: Sunucu Ortamını Hazırlama
        run: |
          sudo apt-get update
          sudo apt-get install -y simg2img img2simg p7zip-full xz-utils e2fsprogs

      - name: İmajları İndirme ve Çıkarma
        run: |
          mkdir -p workspace && cd workspace
          
          echo "OriginOS İndiriliyor..."
          wget -qO originos.zip "${{ github.event.inputs.originos_url }}"
          unzip originos.zip
          mv *.img orig_sparse.img

          echo "AOSP İndiriliyor..."
          wget -qO aosp.img.xz "${{ github.event.inputs.aosp_url }}"
          unxz aosp.img.xz
          mv aosp.img aosp_sparse.img

      - name: Sparse İmajları Raw Formatına Çevirme
        run: |
          cd workspace
          # İmajlar sparse formatındaysa raw'a çevir, değilse isim değiştir
          simg2img orig_sparse.img orig_raw.img || mv orig_sparse.img orig_raw.img
          simg2img aosp_sparse.img aosp_raw.img || mv aosp_sparse.img aosp_raw.img

      - name: Frankenstein Ameliyatı (secilc & .cil Enjeksiyonu)
        run: |
          cd workspace
          mkdir aosp_mnt orig_mnt
          
          # Yeni dosyaları yapıştırırken 'yer yok' hatası almamak için OriginOS imajını 200MB büyütüyoruz
          e2fsck -yf orig_raw.img
          truncate -s +200M orig_raw.img
          resize2fs orig_raw.img

          # İmajları Linux dosya sistemine bağlıyoruz
          sudo mount -o loop,rw orig_raw.img orig_mnt
          sudo mount -o loop,ro aosp_raw.img aosp_mnt

          echo "AOSP'den secilc çekilip OriginOS'e enjekte ediliyor..."
          sudo cp -f aosp_mnt/system/bin/secilc orig_mnt/system/bin/secilc
          sudo chmod 0644 orig_mnt/system/bin/secilc

          echo "SELinux poliçeleri (.cil) aktarılıyor..."
          sudo cp -f aosp_mnt/system/etc/selinux/*.cil orig_mnt/system/etc/selinux/ 2>/dev/null || true
          sudo cp -f aosp_mnt/system/product/etc/selinux/*.cil orig_mnt/system/product/etc/selinux/ 2>/dev/null || true
          sudo cp -f aosp_mnt/system_ext/etc/selinux/*.cil orig_mnt/system_ext/etc/selinux/ 2>/dev/null || true
          
          # Bağlantıları koparıyoruz
          sudo umount orig_mnt
          sudo umount aosp_mnt

      - name: Yamalanmış İmajı Paketleme
        run: |
          cd workspace
          e2fsck -yf orig_raw.img
          # Dosya boyutunu küçültmek için tekrar sparse yapıyoruz
          img2simg orig_raw.img Patched-OriginOS-A04s.img
          # XZ formatında sıkıştırıyoruz (Bu işlem birkaç dakika sürebilir)
          xz -z9 -T0 Patched-OriginOS-A04s.img

      - name: İndirmeye Hazır Hale Getirme (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Patched-OriginOS-A04s
          path: workspace/Patched-OriginOS-A04s.img.xz
          compression-level: 0 # Zaten xz ile sıkıştırdık
