name: Inject Secilc to GSI

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'OriginOS ZIP Linki'
        required: true
        default: 'https://netix.dl.sourceforge.net/project/mystic-gsi-updates/OriginOS/Originos-PD2266-15-compiler250711173629-AB-20260208-MysticGSI.zip?viasf=1&fid=77d8b49dcbabbc5d&e=1783985584&st=8r115uYo_QeP73M9LGN8OA'
      aosp_url:
        description: 'AOSP GSI xz Linki'
        required: true
        default: 'https://github.com/ponces/treble_aosp/releases/download/v2025.05.13/aosp-arm64-ab-gapps-15.0-20250513.img.xz'

jobs:
  patch-gsi:
    runs-on: ubuntu-latest
    
    steps:
      - name: Diski Genislet
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          
      - name: Dosyalari Indir ve Cikart
        run: |
          wget -q -O originos.zip "${{ github.event.inputs.rom_url }}"
          unzip -q originos.zip
          rm originos.zip
          mv *.img os.img
          wget -q -O aosp.img.xz "${{ github.event.inputs.aosp_url }}"
          
      - name: AOSPden Secilc Cikart
        run: |
          unxz aosp.img.xz
          mkdir mnt_aosp
          sudo mount -o ro,loop aosp.img mnt_aosp/
          if [ -f mnt_aosp/system/bin/secilc ]; then
            cp mnt_aosp/system/bin/secilc ./secilc
          elif [ -f mnt_aosp/system/system/bin/secilc ]; then
            cp mnt_aosp/system/system/bin/secilc ./secilc
          fi
          sudo umount mnt_aosp/
          rm -rf mnt_aosp aosp.img

      - name: OriginOS Imajina Secilc Enjekte Et
        run: |
          mkdir mnt_os
          sudo e2fsck -y -f os.img || true
          dd if=/dev/zero bs=1M count=50 >> os.img
          sudo resize2fs os.img
          sudo mount -o rw,loop os.img mnt_os/
          if [ -d mnt_os/system/system/bin ]; then
            sudo cp ./secilc mnt_os/system/system/bin/secilc
            sudo chmod 755 mnt_os/system/system/bin/secilc
          elif [ -d mnt_os/system/bin ]; then
            sudo cp ./secilc mnt_os/system/bin/secilc
            sudo chmod 755 mnt_os/system/bin/secilc
          fi
          sudo umount mnt_os/
          rm -rf mnt_os secilc

      - name: Yamalanmis Imaji Sikistir
        run: |
          tar -czvf Yamali-OriginOS.tar.gz os.img
          rm os.img

      - name: GitHub'a Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Yamali-OriginOS
          path: Yamali-OriginOS.tar.gz
